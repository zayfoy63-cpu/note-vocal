<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mes Notes</title>
<style>
:root{--bg:#0F0C1E;--accent:#8B6FFF;--accent2:#C4B0FF;--text:#FFFFFF;--text2:rgba(255,255,255,0.5);--text3:rgba(255,255,255,0.25);--green:#34D399;--r:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;display:flex;flex-direction:column}
#canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35}
.header{position:relative;z-index:10;background:rgba(15,12,30,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid rgba(255,255,255,0.06);padding:12px 16px 0;flex-shrink:0}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,rgba(139,111,255,0.5),rgba(80,40,180,0.3));border:.5px solid rgba(139,111,255,0.4);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:16px;height:16px;stroke:#C4B0FF;fill:none;stroke-width:2}
.logo-text{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.toggle{display:flex;background:rgba(255,255,255,0.06);border-radius:8px;padding:2px;gap:2px}
.tbtn{width:32px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
.tbtn.on{background:rgba(139,111,255,0.5)}
.tbtn svg{width:14px;height:14px;stroke:rgba(255,255,255,0.3);fill:none;stroke-width:2}
.tbtn.on svg{stroke:#fff}
.search-wrap{position:relative;margin-bottom:12px}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none}
.search-icon svg{width:14px;height:14px;stroke:rgba(255,255,255,0.28);fill:none;stroke-width:2}
.search-clear{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:20px;height:20px;color:rgba(255,255,255,0.5);font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center}
#search{width:100%;background:rgba(255,255,255,0.07);border:.5px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 38px 10px 40px;color:#fff;font-size:14px;outline:none;-webkit-appearance:none}
#search:focus{border-color:rgba(139,111,255,0.5);background:rgba(255,255,255,0.09)}
#search::placeholder{color:rgba(255,255,255,0.22)}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;gap:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.38);cursor:pointer;position:relative;transition:color .15s;white-space:nowrap;letter-spacing:-.1px}
.tab.on{color:#fff}
.tab.on::after{content:'';position:absolute;bottom:0;left:8px;right:8px;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px 2px 0 0}
.chips{display:flex;gap:5px;padding:10px 16px 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;position:relative;z-index:10}
.chips::-webkit-scrollbar{display:none}
.chip-dot{width:5px;height:5px;border-radius:50%;background:currentColor}
.stats{display:flex;gap:8px;padding:10px 16px 8px;flex-shrink:0;position:relative;z-index:10}
.stat{flex:1;background:rgba(255,255,255,0.04);border:.5px solid rgba(255,255,255,0.07);border-radius:12px;padding:8px 12px;text-align:center}
.stat-n{font-size:17px;font-weight:700;color:#fff}
.stat-l{font-size:10px;color:rgba(255,255,255,0.28);margin-top:1px;text-transform:uppercase;letter-spacing:.5px}
.content{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;padding:10px 14px 90px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{display:none}
/* ── Table view ── */
.table-wrap{overflow-x:auto;border-radius:var(--r)}
.table-wrap::-webkit-scrollbar{display:none}
table{width:100%;border-collapse:separate;border-spacing:0 6px;min-width:500px}
thead tr{background:transparent}
th{padding:4px 14px;text-align:left;font-size:10px;font-weight:600;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap}
tbody tr{cursor:pointer}
tbody tr:active td{opacity:.7}
td{padding:13px 14px;font-size:13px;color:#fff;vertical-align:middle;background:rgba(255,255,255,0.04);border-top:.5px solid rgba(255,255,255,0.07);border-bottom:.5px solid rgba(255,255,255,0.07)}
td:first-child{border-radius:12px 0 0 12px;border-left:.5px solid rgba(255,255,255,0.07)}
td:last-child{border-radius:0 12px 12px 0;border-right:.5px solid rgba(255,255,255,0.07)}
td.muted{color:rgba(255,255,255,0.42);font-size:12px}
td.bold{font-weight:600}
/* ── List view – cartes plates ── */
.ncards{display:flex;flex-direction:column;gap:10px}
.ncard{background:rgba(255,255,255,0.04);border:.5px solid rgba(255,255,255,0.09);border-radius:14px;padding:16px;cursor:pointer;transition:background .15s}
.ncard:active{background:rgba(255,255,255,0.07)}
.ncard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px}
.ncard-title{font-size:15px;font-weight:700;color:#fff;line-height:1.35;flex:1}
.ncard-badges{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;padding-top:2px}
.nbadge-cat{font-size:11px;font-weight:600;color:#4ade80;border:1px solid rgba(74,222,128,0.45);border-radius:20px;padding:3px 10px;white-space:nowrap}
.nbadge-src{font-size:11px;font-weight:500;color:#a78bfa;border:1px solid rgba(167,139,250,0.45);border-radius:20px;padding:3px 10px;white-space:nowrap}
.ncard-expl{font-size:13px;color:rgba(255,255,255,0.48);line-height:1.5;margin-bottom:10px}
.ncard-meta{display:flex;gap:6px;flex-wrap:wrap}
.nmeta-tag{font-size:11px;color:rgba(255,255,255,0.38);background:rgba(255,255,255,0.06);border:.5px solid rgba(255,255,255,0.1);border-radius:6px;padding:3px 9px}
/* ── Badge (table view) ── */
.badge{display:inline-flex;align-items:center;border-radius:6px;padding:3px 8px;font-size:10px;font-weight:600;letter-spacing:.3px;margin-bottom:6px}
/* ── Overlay / Sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:100;pointer-events:none;transition:background .3s;display:flex;align-items:flex-end}
.overlay.open{background:rgba(0,0,0,0.72);pointer-events:all}
.sheet{width:100%;background:#181230;border-radius:24px 24px 0 0;border-top:.5px solid rgba(255,255,255,0.1);transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:84vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,16px)}
.sheet::-webkit-scrollbar{display:none}
.overlay.open .sheet{transform:translateY(0)}
.handle{width:36px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:14px auto 16px}
.sheet-body{padding:0 20px 12px}
.sheet-title{font-size:20px;font-weight:700;color:#fff;line-height:1.35;margin-bottom:6px;letter-spacing:-.3px}
.sheet-source{font-size:13px;color:rgba(255,255,255,0.42);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.sheet-source svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.sdivider{height:.5px;background:rgba(255,255,255,0.07);margin:14px 0}
.slabel{font-size:10px;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;font-weight:600}
.svalue{font-size:15px;color:rgba(255,255,255,0.78);line-height:1.65;margin-bottom:14px}
.svalue.ar{font-size:17px;color:var(--accent2);text-align:right;direction:rtl}
.svalue.fr{color:var(--green);font-size:14px}
.slink{display:flex;align-items:center;gap:8px;background:rgba(139,111,255,0.1);border:.5px solid rgba(139,111,255,0.25);border-radius:10px;padding:10px 14px;color:var(--accent2);font-size:12px;text-decoration:none;word-break:break-all;margin-top:5px}
.slink svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0}
.export-title{font-size:17px;font-weight:700;color:#fff;text-align:center;margin-bottom:6px}
.export-sub{font-size:14px;color:rgba(255,255,255,0.42);text-align:center;margin-bottom:20px;line-height:1.5}
.btn-confirm{width:100%;padding:14px;background:linear-gradient(135deg,#8B6FFF,#6B4EFF);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px}
.btn-cancel{width:100%;padding:12px;background:rgba(255,255,255,0.06);border:.5px solid rgba(255,255,255,0.1);border-radius:14px;color:rgba(255,255,255,0.45);font-size:15px;cursor:pointer}
.export-status{text-align:center;font-size:13px;color:var(--accent2);padding:8px 0;display:none}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.spinner{width:30px;height:30px;border:2px solid rgba(139,111,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:14px;color:rgba(255,255,255,0.28)}
.empty{text-align:center;padding:50px 20px;color:rgba(255,255,255,0.28);font-size:13px;line-height:1.6}
.empty-icon{font-size:36px;margin-bottom:12px}
.error-btn{margin-top:14px;display:inline-block;background:rgba(139,111,255,0.15);border:.5px solid rgba(139,111,255,0.35);border-radius:20px;padding:8px 18px;color:var(--accent2);font-size:13px;cursor:pointer}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,12,30,0.96);border-top:.5px solid rgba(255,255,255,0.07);display:flex;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));z-index:20;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0;color:rgba(255,255,255,0.28);font-size:9px;font-weight:500;transition:color .15s}
.ni.on{color:var(--accent2)}
.ni svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8}
.ni-dot{width:3px;height:3px;border-radius:50%;background:var(--accent);display:none}
.ni.on .ni-dot{display:block}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="header">
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="3" cy="6" r="2"/><circle cx="21" cy="6" r="2"/><circle cx="3" cy="18" r="2"/><circle cx="21" cy="18" r="2"/><line x1="5" y1="6" x2="9" y2="11"/><line x1="19" y1="6" x2="15" y2="11"/><line x1="5" y1="18" x2="9" y2="13"/><line x1="19" y1="18" x2="15" y2="13"/></svg></div>
      <span class="logo-text">Mes Notes</span>
    </div>
    <div class="toggle">
      <div class="tbtn" id="btn-table" onclick="setView('table')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg></div>
      <div class="tbtn on" id="btn-list" onclick="setView('list')"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></div>
    </div>
  </div>
  <div class="search-wrap">
    <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
    <input type="text" id="search" placeholder="Rechercher dans toutes les notes…" oninput="onSearch(this.value)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div class="tabs" id="tabs"></div>
</div>
<div class="chips" id="chips" style="display:none"></div>
<div class="stats" id="stats"></div>
<div class="content" id="content"><div class="loading"><div class="spinner"></div><div class="loading-txt">Chargement…</div></div></div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="sheet"><div class="handle"></div><div class="sheet-body" id="sheet-body"></div></div>
</div>
<div class="overlay" id="export-overlay" onclick="handleExportOverlayClick(event)">
  <div class="sheet"><div class="handle"></div>
    <div class="sheet-body" style="padding:0 18px 8px">
      <div class="export-title">Exporter les notes</div>
      <div class="export-sub" id="export-sub"></div>
      <div class="export-status" id="export-status"></div>
      <button class="btn-confirm" onclick="doExport()">Ouvrir le PDF</button>
      <button class="btn-cancel" onclick="closeExportSheet()">Annuler</button>
    </div>
  </div>
</div>

<div class="nav">
  <div class="ni on" id="ni-notes" onclick="showNotes()">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Notes<div class="ni-dot"></div>
  </div>
  <div class="ni" id="ni-search" onclick="focusSearch()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Chercher<div class="ni-dot"></div>
  </div>
  <div class="ni" id="ni-export" onclick="openExportSheet()">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export<div class="ni-dot"></div>
  </div>
</div>

<script>
let allNotes=[],currentView='list',activeTheme='Tous';
const TC={'Philosophie':['#A78BFA','rgba(139,92,246,0.15)','rgba(139,92,246,0.25)'],'Religion':['#818CF8','rgba(99,102,241,0.15)','rgba(99,102,241,0.2)'],'Psychologie':['#F472B6','rgba(244,114,182,0.12)','rgba(244,114,182,0.2)'],'Économie':['#34D399','rgba(16,185,129,0.12)','rgba(16,185,129,0.18)'],'Finance':['#2DD4BF','rgba(45,212,191,0.12)','rgba(45,212,191,0.18)'],'Histoire':['#FB923C','rgba(251,146,60,0.12)','rgba(251,146,60,0.18)'],'Sciences':['#60A5FA','rgba(96,165,250,0.12)','rgba(96,165,250,0.18)'],'Développement personnel':['#C084FC','rgba(192,132,252,0.12)','rgba(192,132,252,0.2)'],'Politique':['#F87171','rgba(248,113,113,0.12)','rgba(248,113,113,0.18)']};
const TE={'Philosophie':'🏛','Religion':'☪️','Psychologie':'🧠','Économie':'📈','Finance':'💰','Histoire':'📜','Sciences':'🔬','Développement personnel':'🚀','Politique':'🏛'};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function tc(t){for(const[k,v]of Object.entries(TC))if(t&&t.includes(k))return v;return['#9CA3AF','rgba(156,163,175,0.1)','rgba(156,163,175,0.15)']}
function te(t){for(const[k,v]of Object.entries(TE))if(t&&t.includes(k))return v;return'📝'}
function badge(t){const[c,bg,bd]=tc(t);return`<span class="badge" style="color:${c};background:${bg};border:.5px solid ${bd}">${esc(t)||'Autre'}</span>`}
function stype(s){if(!s)return'Autre';return s.split(':')[0].trim()||'Autre'}
async function loadNotes(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-txt">Chargement des notes…</div></div>';
  try{
    const r=await fetch('/api/notes');const d=await r.json();
    if(!d.success)throw new Error(d.error);
    allNotes=d.notes;
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading"><div class="empty-icon">⚠️</div><div class="loading-txt">Impossible de charger les notes.</div><div class="error-btn" onclick="loadNotes()">Réessayer</div></div>';
    return;
  }
  activeTheme='Tous';buildTabs();render();
}
function themes(){return['Tous',...new Set(allNotes.map(n=>n['Thème']||'Autre'))]}
function buildTabs(){const ts=themes();window.__tabs=ts;document.getElementById('tabs').innerHTML=ts.map((t,i)=>`<div class="tab ${t===activeTheme?'on':''}" onclick="setTheme(window.__tabs[${i}])">${t==='Tous'?'Tous':t.length>12?t.substring(0,11)+'…':t}</div>`).join('')}
function buildChips(){}
function filtered(){
  const q=document.getElementById('search').value.toLowerCase();
  return allNotes.filter(n=>{
    const mt=activeTheme==='Tous'||(n['Thème']||'Autre')===activeTheme;
    const mq=!q||Object.values(n).some(v=>String(v).toLowerCase().includes(q));
    return mt&&mq;
  });
}
function updateStats(notes){
  const th=new Set(notes.map(n=>n['Thème']||'Autre')).size;
  const sr=new Set(notes.map(n=>n['Source']||'').filter(Boolean)).size;
  document.getElementById('stats').innerHTML=`<div class="stat"><div class="stat-n">${notes.length}</div><div class="stat-l">notes</div></div><div class="stat"><div class="stat-n">${th}</div><div class="stat-l">thèmes</div></div><div class="stat"><div class="stat-n">${sr}</div><div class="stat-l">sources</div></div>`;
}
function render(){
  const notes=filtered();updateStats(notes);
  const c=document.getElementById('content');
  if(!notes.length){c.innerHTML='<div class="empty"><div class="empty-icon">🔍</div>Aucune note trouvée.</div>';return}
  if(currentView==='table')renderTable(notes,c);else renderList(notes,c);
}
function noteIdx(n){
  let idx=allNotes.indexOf(n);
  if(idx===-1){idx=allNotes.findIndex(x=>x['Donnée']===n['Donnée']&&x['Source']===n['Source']);}
  return idx;
}
function renderTable(notes,c){
  const rows=notes.map(n=>{
    const idx=noteIdx(n);
    const explRaw=(n['Explication']||'').substring(0,55)+((n['Explication']||'').length>55?'…':'');
    return`<tr onclick="openSheet(${idx})"><td>${badge(n['Thème'])}</td><td class="muted">${esc((n['Source']||'').substring(0,22))}</td><td class="muted">${esc(n['Référence']||'')}</td><td class="bold">${esc((n['Donnée']||'').substring(0,38))}</td><td class="muted">${esc(explRaw)}</td></tr>`;
  }).join('');
  c.innerHTML=`<div class="table-wrap"><table><thead><tr><th>Thème</th><th>Source</th><th>Réf.</th><th>Donnée</th><th>Explication</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}
function renderList(notes,c){
  const html=notes.map(n=>{
    const idx=noteIdx(n);
    const theme=n['Thème']||'Autre';
    const src=n['Source']||'';
    const srcShort=(src.includes(':')?src.split(':').slice(1).join(':').trim():src).substring(0,22);
    const expl=(n['Explication']||'').substring(0,130);
    const explHtml=expl?`<div class="ncard-expl">${expl}${(n['Explication']||'').length>130?'…':''}</div>`:'';
    const ref=n['Référence']||'';
    const metaHtml=ref?`<div class="ncard-meta"><span class="nmeta-tag">${ref}</span></div>`:'';
    const srcBadge=srcShort?`<span class="nbadge-src">${srcShort}</span>`:'';
    return`<div class="ncard" onclick="openSheet(${idx})"><div class="ncard-top"><div class="ncard-title">${n['Donnée']||''}</div><div class="ncard-badges"><span class="nbadge-cat">${theme}</span>${srcBadge}</div></div>${explHtml}${metaHtml}</div>`;
  }).join('');
  c.innerHTML=`<div class="ncards">${html}</div>`;
}
function toggleGroup(hdr){
  const gn=hdr.nextElementSibling,ch=hdr.querySelector('.chevron'),open=ch.classList.contains('open');
  gn.classList.toggle('closed',open);ch.classList.toggle('open',!open);
}
async function openSheet(idx){
  if(!allNotes[idx]){await loadNotes();}
  const n=allNotes[idx];
  if(!n)return;
  const isAr=/[\u0600-\u06FF]/.test(n['Donnée']||'');
  const lienUrl=esc(n['Lien']||'');
  const lien=n['Lien']?`<a href="${lienUrl}" target="_blank" rel="noopener noreferrer" class="slink"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>${lienUrl}</a>`:'';
  const trad=n['Traduction FR']?`<div class="slabel">Traduction FR</div><div class="svalue fr">${esc(n['Traduction FR'])}</div>`:'';
  const expl=n['Explication']?`<div class="slabel">Explication</div><div class="svalue">${esc(n['Explication'])}</div>`:'';
  const ref=n['Référence']?`<div class="slabel">Référence</div><div class="svalue">${esc(n['Référence'])}</div>`:'';
  document.getElementById('sheet-body').innerHTML=`<div style="margin-bottom:8px">${badge(n['Thème'])}</div><div class="sheet-title ${isAr?'ar':''}">${esc(n['Donnée']||'')}</div><div class="sheet-source"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>${esc(n['Source']||'Sans source')}</div>${ref}<div class="sdivider"></div>${expl}${trad}${lien}`;
  document.getElementById('overlay').classList.add('open');
}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open')}
function handleExportOverlayClick(e){if(e.target===document.getElementById('export-overlay'))closeExportSheet()}
function setView(v){currentView=v;document.getElementById('btn-table').classList.toggle('on',v==='table');document.getElementById('btn-list').classList.toggle('on',v==='list');render()}
function setTheme(t){activeTheme=t;buildTabs();render()}
function setSource(s){activeSource=s;buildChips();render()}
function onSearch(v){document.getElementById('search-clear').style.display=v?'flex':'none';render()}
function clearSearch(){document.getElementById('search').value='';document.getElementById('search-clear').style.display='none';render()}
function setNav(a){['notes','search','export'].forEach(n=>{document.getElementById('ni-'+n).classList.toggle('on',n===a)})}
function focusSearch(){setNav('search');document.getElementById('search').focus()}
function showNotes(){setNav('notes')}
function openExportSheet(){setNav('export');document.getElementById('export-sub').textContent=`${filtered().length} note(s) seront exportées en PDF.`;document.getElementById('export-status').style.display='none';document.getElementById('export-overlay').classList.add('open')}
function closeExportSheet(){document.getElementById('export-overlay').classList.remove('open');setNav('notes')}
function doExport(){
  document.getElementById('export-status').textContent='Génération en cours…';
  document.getElementById('export-status').style.display='block';
  const params=new URLSearchParams();
  if(activeTheme!=='Tous')params.set('theme',activeTheme);
  if(activeSource!=='Tous')params.set('source',activeSource);
  const q=document.getElementById('search').value;
  if(q)params.set('q',q);
  const url='/export-pdf'+(params.toString()?'?'+params.toString():'');
  setTimeout(()=>{window.open(url,'_blank');closeExportSheet()},800);
}
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');let nodes=[];
function initCanvas(){cv.width=window.innerWidth;cv.height=window.innerHeight;nodes=Array.from({length:28},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()*1.4+.5,p:Math.random()*Math.PI*2}))}
function drawNet(){ctx.clearRect(0,0,cv.width,cv.height);nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;n.p+=.01;if(n.x<0||n.x>cv.width)n.vx*=-1;if(n.y<0||n.y>cv.height)n.vy*=-1});nodes.forEach((a,i)=>nodes.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<100){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(100,60,200,${(1-d/100)*.08})`;ctx.lineWidth=.6;ctx.stroke()}}));nodes.forEach(n=>{ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle=`rgba(140,100,255,${.1+Math.sin(n.p)*.05})`;ctx.fill()});requestAnimationFrame(drawNet)}
window.addEventListener('resize',initCanvas);initCanvas();drawNet();
loadNotes();
</script>
</body>
